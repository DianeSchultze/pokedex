<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" >
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokedex | bydianeschultze.com</title>
  <link rel="stylesheet" href="styles.css" >
  <link rel="icon" type="image/png" href="assets/images/pikachu-favicon.png" sizes="16x16">
</head>
<body>
  <header class="siteHeader">
    <h1>Pokedex</h1>
  </header>

  <div class="pageLayout">
    <aside class="sidebar">
      <section class="filterSection">
        <h2>Filters</h2>

        <div class="filterGroup">
          <label for="filterGen">Generation</label>
          <select id="filterGen">
            <option value="All">All</option>
            <option value="1">Gen 1</option>
            <option value="2">Gen 2</option>
            <option value="3">Gen 3</option>
            <option value="4">Gen 4</option>
            <option value="5">Gen 5</option>
            <option value="6">Gen 6</option>
            <option value="7">Gen 7</option>
            <option value="8">Gen 8</option>
            <option value="9">Gen 9</option>
          </select>
        </div>

        <div class="filterGroup">
          <label for="searchInput">Search</label>
          <input
            id="searchInput"
            type="text"
            placeholder="Name or #"
            autocomplete="off"
          >
        </div>

        <div class="filterGroup">
          <h3>Types</h3>
          <div id="typeFilters" class="typeFilterList"></div>
        </div>

        <button id="resetBtn" type="button">Reset Filters</button>
      </section>
    </aside>

    <main class="content">
      <section class="contentHeader">
        <h2>Pokemon List</h2>
        <p id="statusText">Loading Pokémon...</p>
      </section>

      <section id="pokemonGrid" class="pokemonGrid"></section>
    </main>
  </div>

  <div id="pokemonModal" class="modal hidden" aria-hidden="true">
    <div class="modalOverlay" id="modalOverlay"></div>

    <div class="modalContent" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <button id="closeModalBtn" class="closeModalBtn" type="button" aria-label="Close details">
        ×
      </button>

      <div id="modalBody"></div>
    </div>
  </div>

  <footer>
    <small>
      Pokémon data is sourced from
      <a href="https://pokeapi.co/" target="_blank" rel="noopener noreferrer">PokéAPI</a>.
      All code authored by <strong>Diane Schultze</strong>.
    </small>
  </footer>

  <script src="script.js"></script>
</body>
</html>
